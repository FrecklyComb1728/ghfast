# ==================== GitHub 代理自定义配置 ====================
# 更换域名需执行（将 new.domain.com 替换为你的域名）:
#   sed -i 's/gh\.1s\.fan/new.domain.com/g' nginx.conf
#   sed -i 's/gh\.1s\.fan/new.domain.com/g' index.html
# 注意: 更换后需同步修改 SSL 证书路径、日志路径、root 目录等实际路径
# ==============================================================
# 缓存目录定义
proxy_cache_path /www/wwwroot/gh.1s.fan/proxy_cache_dir/static levels=1:2 keys_zone=gh_static_cache:50m inactive=7d max_size=10g;
proxy_cache_path /www/wwwroot/gh.1s.fan/proxy_cache_dir/dynamic levels=1:2 keys_zone=gh_dynamic_cache:50m inactive=1d max_size=2g;
log_format cache_status '$remote_addr - $remote_user [$time_local] ' '"$request" $status $body_bytes_sent ' '"$http_referer" "$http_user_agent" ' 'cache_status:$upstream_cache_status';
# WebSocket 升级支持
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
# 域名上游映射
map $uri $gist_backend {
    "~^/[^/]+/[^/]+/raw/" "https://gist.githubusercontent.com";
    default "https://gist.github.com";
}
map $uri $gist_backend_host {
    "~^/[^/]+/[^/]+/raw/" "gist.githubusercontent.com";
    default "gist.github.com";
}
map $github_origin_host $redirect_subdomain {
    "github.com"                            "gh.1s.fan";
    "www.github.com"                        "gh.1s.fan";
    "api.github.com"                        "api.gh.1s.fan";
    "raw.githubusercontent.com"             "raw.gh.1s.fan";
    "camo.githubusercontent.com"            "camo.gh.1s.fan";
    "docs.github.com"                       "docs.gh.1s.fan";
    "gist.github.com"                       "gist.gh.1s.fan";
    "ghcr.io"                               "ghcr.gh.1s.fan";
    "github.githubassets.com"               "assets.gh.1s.fan";
    "avatars.githubusercontent.com"         "avatars.gh.1s.fan";
    "objects.githubusercontent.com"         "objects.gh.1s.fan";
    "codeload.github.com"                   "codeload.gh.1s.fan";
    "user-images.githubusercontent.com"     "user-images.gh.1s.fan";
    "private-user-images.githubusercontent.com" "private-user-images.gh.1s.fan";
    "gist-assets.githubusercontent.com"     "gist-assets.gh.1s.fan";
    "release-assets.githubusercontent.com"  "release-assets.gh.1s.fan";
    "github-releases.githubusercontent.com" "github-releases.gh.1s.fan";
    default                                 "";
}
map $host $backend {
    gh.1s.fan                 "https://github.com";
    api.gh.1s.fan             "https://api.github.com";
    raw.gh.1s.fan             "https://raw.githubusercontent.com";
    camo.gh.1s.fan            "https://camo.githubusercontent.com";
    docs.gh.1s.fan            "https://docs.github.com";
    gist.gh.1s.fan            $gist_backend;
    ghcr.gh.1s.fan            "https://ghcr.io";
    assets.gh.1s.fan          "https://github.githubassets.com";
    avatars.gh.1s.fan         "https://avatars.githubusercontent.com";
    objects.gh.1s.fan         "https://objects.githubusercontent.com";
    codeload.gh.1s.fan        "https://codeload.github.com";
    user-images.gh.1s.fan     "https://user-images.githubusercontent.com";
    private-user-images.gh.1s.fan "https://private-user-images.githubusercontent.com";
    gist-assets.gh.1s.fan     "https://gist-assets.githubusercontent.com";
    release-assets.gh.1s.fan  "https://release-assets.githubusercontent.com";
    github-releases.gh.1s.fan "https://github-releases.githubusercontent.com";
    default                   "https://github.com";
}
map $host $backend_host {
    gh.1s.fan                 "github.com";
    api.gh.1s.fan             "api.github.com";
    raw.gh.1s.fan             "raw.githubusercontent.com";
    camo.gh.1s.fan            "camo.githubusercontent.com";
    docs.gh.1s.fan            "docs.github.com";
    ghcr.gh.1s.fan            "ghcr.io";
    gist.gh.1s.fan            $gist_backend_host;
    assets.gh.1s.fan          "github.githubassets.com";
    objects.gh.1s.fan         "objects.githubusercontent.com";
    avatars.gh.1s.fan         "avatars.githubusercontent.com";
    codeload.gh.1s.fan        "codeload.github.com";
    user-images.gh.1s.fan     "user-images.githubusercontent.com";
    private-user-images.gh.1s.fan "private-user-images.githubusercontent.com";
    gist-assets.gh.1s.fan     "gist-assets.githubusercontent.com";
    release-assets.gh.1s.fan  "release-assets.githubusercontent.com";
    github-releases.gh.1s.fan "github-releases.githubusercontent.com";
    default                   "github.com";
}
# 按域名分配缓存区
map $host $cache_zone {
    raw.gh.1s.fan             gh_static_cache;
    camo.gh.1s.fan            gh_static_cache;
    assets.gh.1s.fan          gh_static_cache;
    avatars.gh.1s.fan         gh_static_cache;
    objects.gh.1s.fan         gh_static_cache;
    codeload.gh.1s.fan        gh_static_cache;
    user-images.gh.1s.fan     gh_static_cache;
    private-user-images.gh.1s.fan gh_static_cache;
    gist-assets.gh.1s.fan     gh_static_cache;
    release-assets.gh.1s.fan  gh_static_cache;
    github-releases.gh.1s.fan gh_static_cache;

    gh.1s.fan                 gh_dynamic_cache;
    api.gh.1s.fan             gh_dynamic_cache;
    docs.gh.1s.fan            gh_dynamic_cache;
    ghcr.gh.1s.fan            gh_dynamic_cache;
    default                   gh_dynamic_cache;
}
# 按签名参数判断高风险对象请求
map $args $has_signed_query {
    default 0;
    "~*(^|&)(X-Amz-Algorithm|X-Amz-Credential|X-Amz-Date|X-Amz-Expires|X-Amz-Signature|X-Amz-SignedHeaders)=" 1;
}
# 标记会变化的 codeload 分支归档
map $uri $is_mutable_codeload_ref {
    default 0;
    "~^/[^/]+/[^/]+/(?:zip|tar\.gz|legacy\.zip|legacy\.tar\.gz)/refs/" 1;
}
# 按域名映射到域名 root 目录
map $host $doc_root {
    gh.1s.fan                 /www/wwwroot/gh.1s.fan/gh.1s.fan;
    api.gh.1s.fan             /www/wwwroot/gh.1s.fan/api.gh.1s.fan;
    raw.gh.1s.fan             /www/wwwroot/gh.1s.fan/raw.gh.1s.fan;
    gist.gh.1s.fan            /www/wwwroot/gh.1s.fan/gist.gh.1s.fan;
    ghcr.gh.1s.fan            /www/wwwroot/gh.1s.fan/ghcr.gh.1s.fan;
    docs.gh.1s.fan            /www/wwwroot/gh.1s.fan/docs.gh.1s.fan;
    camo.gh.1s.fan            /www/wwwroot/gh.1s.fan/camo.gh.1s.fan;
    assets.gh.1s.fan          /www/wwwroot/gh.1s.fan/assets.gh.1s.fan;
    objects.gh.1s.fan         /www/wwwroot/gh.1s.fan/objects.gh.1s.fan;
    avatars.gh.1s.fan         /www/wwwroot/gh.1s.fan/avatars.gh.1s.fan;
    codeload.gh.1s.fan        /www/wwwroot/gh.1s.fan/codeload.gh.1s.fan;
    gist-assets.gh.1s.fan     /www/wwwroot/gh.1s.fan/gist-assets.gh.1s.fan;
    user-images.gh.1s.fan     /www/wwwroot/gh.1s.fan/user-images.gh.1s.fan;
    private-user-images.gh.1s.fan /www/wwwroot/gh.1s.fan/private-user-images.gh.1s.fan;
    release-assets.gh.1s.fan  /www/wwwroot/gh.1s.fan/release-assets.gh.1s.fan;
    github-releases.gh.1s.fan /www/wwwroot/gh.1s.fan/github-releases.gh.1s.fan;
    default                   /www/wwwroot/gh.1s.fan/gh.1s.fan;
}
# API 域名透传鉴权信息
map $host $forward_authorization {
    default "";
    api.gh.1s.fan $http_authorization;
    ghcr.gh.1s.fan $http_authorization;
}
map $host $forward_cookie {
    default "";
    api.gh.1s.fan $http_cookie;
}
map $http_authorization $has_authorization {
    default 1;
    "" 0;
}
map $http_cookie $has_cookie {
    default 1;
    "" 0;
}
map $host $cache_key_suffix {
    default "";
    api.gh.1s.fan "|accept:$http_accept|api_ver:$http_x_github_api_version";
}
map $host:$has_authorization:$has_cookie $api_skip_cache {
    default 0;
    "~^api\.gh\.1s\.fan:1:[01]$" 1;
    "~^api\.gh\.1s\.fan:[01]:1$" 1;
    "~^ghcr\.gh\.1s\.fan:1:[01]$" 1;
}
map $host:$has_signed_query:$is_mutable_codeload_ref $skip_risky_cache {
    default 0;
    "~^objects\.gh\.1s\.fan:1:0$" 1;
    "~^codeload\.gh\.1s\.fan:[01]:1$" 1;
    "~^gist\.gh\.1s\.fan:" 1;
}
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name codeload.gh.1s.fan gist.gh.1s.fan docs.gh.1s.fan objects.gh.1s.fan ghcr.gh.1s.fan raw.gh.1s.fan gist-assets.gh.1s.fan assets.gh.1s.fan api.gh.1s.fan camo.gh.1s.fan gh.1s.fan avatars.gh.1s.fan user-images.gh.1s.fan private-user-images.gh.1s.fan release-assets.gh.1s.fan github-releases.gh.1s.fan;
    ssl_certificate /www/server/panel/vhost/cert/gh.1s.fan/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/gh.1s.fan/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Server "mfweb/1.1";
    # add_header Strict-Transport-Security "max-age=31536000" always;
    include /www/server/panel/vhost/nginx/extension/gh.1s.fan/*.conf;
    include /www/server/panel/vhost/nginx/well-known/gh.1s.fan.conf;
    root $doc_root;
    merge_slashes off;
    index index.html index.htm;
    # ==================== 连接与传输优 ?====================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    #IP-RESTRICT-START 限制访问ip的配置，IP黑白名单
    deny 74.7.227.0/24;
    deny 74.7.242.0/24;
    #IP-RESTRICT-END

    # CDN有Gzip，暂时关
    # gzip on;
    # gzip_min_length 1m;
    # gzip_buffers 16 8k;
    # gzip_http_version 1.1;
    # gzip_comp_level 6;
    # gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    # gzip_vary on;
    # gzip_proxied expired no-cache no-store private auth;
    # gzip_disable "MSIE [1-6]\.";
    # ==================== 安全路径拦截 ====================
    location ~* ^/(?:\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime|vendor|__pycache__)(?:/|$) {
        return 404;
    }
    location ~* ^/(login|signup|session|logout|settings|account|notifications|new|import|authorize|organizations/plan|marketplace) {
        return 404;
    }
    location ~ ^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$ {
        return 403;
    }
    location /.well-known {
        allow all;
    }
    location ~* (^|/)proxy_cache_dir(/|$) {
        return 403;
    }
    # ==================== 核心反代 ====================
    # / 路径：gh.1s.fan/index.html 则返回本地页，其他子域名无此文件自动回源
    location = / {
        try_files /index.html @github_backend;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }
    location = /favicon.ico {
        try_files $uri @github_backend;
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        try_files $uri @github_backend;
        access_log off;
    }
    # https开头直接跳转对应域名
    location ~ ^/https?://(?<github_origin_host>[^/]+)(?<github_origin_path>/.*)?$ {
        if ($redirect_subdomain = "") {
            return 404;
        }
        return 301 https://$redirect_subdomain$github_origin_path$is_args$args;
    }
    # 其余路径：本地文件优先，不存在则回源
    location / {
        try_files $uri $uri/ @github_backend;
    }
    location @github_backend {
        resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        resolver_timeout 5s;
        proxy_pass $backend;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 30s;
        proxy_ssl_name $backend_host;
        proxy_ssl_server_name on;
        proxy_ssl_trusted_certificate /etc/pki/tls/certs/ca-bundle.crt;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 3;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        # ===== 缓存核心 =====
        proxy_cache $cache_zone;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$host$uri$is_args$args$cache_key_suffix";
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_bypass $skip_risky_cache $api_skip_cache;
        proxy_no_cache $skip_risky_cache $api_skip_cache;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_background_update on;
        proxy_cache_valid 200 206 10m;
        proxy_cache_valid 301 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_valid 403 30s;
        proxy_cache_valid 500 502 503 504 0;
        # 清除 Cookie/Authorization
        proxy_set_header Cookie $forward_cookie;
        proxy_set_header Authorization $forward_authorization;
        # ===== CSP 策略替换 =====
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; img-src * data: blob:; style-src 'unsafe-inline' 'self' https:; script-src 'unsafe-inline' 'unsafe-eval' 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        proxy_hide_header Server;
        proxy_hide_header X-GitHub-Request-Id;
        # ===== 重定向替换=====
        # *.githubusercontent.com
        proxy_redirect ~*^https?://(raw|objects|github-releases|release-assets|avatars|gist|camo|user-images|private-user-images|gist-assets)\.githubusercontent\.com/(.*)$ https://$1.gh.1s.fan/$2;

        # *.github.com
        proxy_redirect ~*^https?://(api|codeload|gist|docs)\.github\.com/(.*)$ https://$1.gh.1s.fan/$2;

        # 特殊情况
        proxy_redirect ~*^https?://github\.githubassets\.com/(.*)$ https://assets.gh.1s.fan/$1;
        proxy_redirect ~*^https?://ghcr\.io/(.*)$ https://ghcr.gh.1s.fan/$1;
        proxy_redirect ~*^https?://(?:www\.)?github\.com/(.*)$ https://gh.1s.fan/$1;
        # ===== sub_filter 完全替换 =====
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript application/json;
        sub_filter 'ghcr.io'                               'ghcr.gh.1s.fan';
        sub_filter 'github.com'                            'gh.1s.fan';
        sub_filter 'github.githubassets.com'               'assets.gh.1s.fan';
        sub_filter 'raw.githubusercontent.com'             'raw.gh.1s.fan';
        sub_filter 'gist.githubusercontent.com'            'gist.gh.1s.fan';
        sub_filter 'camo.githubusercontent.com'            'camo.gh.1s.fan';
        sub_filter 'avatars.githubusercontent.com'         'avatars.gh.1s.fan';
        sub_filter 'objects.githubusercontent.com'         'objects.gh.1s.fan';
        sub_filter 'gist-assets.githubusercontent.com'     'gist-assets.gh.1s.fan';
        sub_filter 'user-images.githubusercontent.com'     'user-images.gh.1s.fan';
        sub_filter 'private-user-images.githubusercontent.com' 'private-user-images.gh.1s.fan';
        sub_filter 'release-assets.githubusercontent.com'  'release-assets.gh.1s.fan';
        sub_filter 'github-releases.githubusercontent.com' 'github-releases.gh.1s.fan';
    }
    access_log /www/wwwlogs/gh.1s.fan.log cache_status;
    error_log /www/wwwlogs/gh.1s.fan.error.log;
}
